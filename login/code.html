<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | The Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://wefyplszmgkvahfhwwwv.supabase.co';
        const supabaseKey = 'sb_publishable_rkg0SBPqp_SSwAAOj9hHxQ__Iq7M89B';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function loginWithGoogle() {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    // Redirect back to homepage after Google Auth
                    redirectTo: 'http://localhost:3000/updated_homepage/code.html'
                }
            });
            if (error) {
                console.error("Login failed:", error);
                alert("Google Login failed.");
            }
        }
    </script>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center p-6 m-0">

    <div class="w-full max-w-sm flex flex-col items-center">
        <!-- Main Top Text -->
        <h1 class="text-[28px] font-extrabold text-slate-900 mb-12 tracking-tight">Log in to Your Account</h1>
        
        <!-- Red Rectangle Google Button -->
        <button onclick="loginWithGoogle()" class="w-full relative flex items-center justify-center gap-3 bg-[#e84133] hover:bg-[#d63a2d] active:bg-[#c43224] text-white py-[18px] px-6 rounded shadow-lg shadow-red-500/20 transition-all duration-200 transform hover:-translate-y-1 active:translate-y-0 text-center no-underline cursor-pointer">
            
            <!-- Google Logo (White Fill inside the red button) -->
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#FFFFFF"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.16v2.84C3.99 20.53 7.7 23 12 23z" fill="#FFFFFF"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.16C1.43 8.55 1 10.22 1 12s.43 3.45 1.16 4.93l3.68-2.84z" fill="#FFFFFF"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.16 7.07l3.68 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#FFFFFF"/>
            </svg>

            <!-- Required Text -->
            <span class="text-[17px] font-semibold tracking-wide">Log in to Your Account</span>
        </button>
    </div>

</body>
</html>
