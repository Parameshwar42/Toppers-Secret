<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | The Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
    <!-- Supabase SDK for direct uploads -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen pt-20 px-6">
    <div class="max-w-lg mx-auto bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
        <h1 class="text-3xl font-['Plus_Jakarta_Sans'] font-extrabold text-slate-900 mb-2">Admin Portal</h1>
        <p class="text-slate-500 mb-8 text-sm">Upload new PDF papers to the platform database.</p>
        
        <form id="uploadForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Exam Category</label>
                <select name="category" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="ap_eamcet">AP EAMCET</option>
                    <option value="ts_eamcet">TS EAMCET</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Year</label>
                <select name="year" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                    <option value="2022">2022</option>
                    <option value="2021">2021</option>
                    <option value="2020">2020</option>
                    <option value="2019">2019</option>
                    <option value="2018">2018</option>
                    <option value="2017">2017</option>
                    <option value="2016">2016</option>
                    <option value="2015">2015</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Shift Title</label>
                <input type="text" name="shiftTitle" placeholder="e.g. Shift 1 - Engineering" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">PDF File</label>
                <input type="file" name="pdf" accept="application/pdf" required class="w-full bg-slate-50 border border-slate-200 cursor-pointer rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Admin Password</label>
                <input type="password" name="password" placeholder="Enter password (admin123)" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-600/30 hover:bg-blue-700 active:scale-95 transition-all">
                Upload Paper
            </button>

            <!-- Progress Bar (Newly Added) -->
            <div id="progressContainer" class="hidden space-y-2">
                <div class="flex justify-between text-xs font-bold text-slate-500 uppercase tracking-widest">
                    <span>Uploading to Cloud...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                    <div id="progressBar" class="bg-blue-600 h-full w-0 transition-all duration-300"></div>
                </div>
            </div>
        </form>

        <div id="statusMessage" class="mt-6 text-center font-semibold text-sm hidden"></div>
    </div>

    <script>
        // Use the public anon key for direct uploads
        const supabaseUrl = 'https://wefyplszmgkvahfhwwwv.supabase.co';
        const supabaseKey = 'sb_publishable_rkg0SBPqp_SSwAAOj9hHxQ__Iq7M89B';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const status = document.getElementById('statusMessage');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            
            const formData = new FormData(e.target);
            const password = formData.get('password');
            const pdfFile = formData.get('pdf');
            const category = formData.get('category');
            const year = formData.get('year');
            const shiftTitle = formData.get('shiftTitle');

            // 1. Password check
            if (password !== 'admin123') {
                status.className = 'mt-6 text-center font-semibold text-sm text-red-500';
                status.innerText = '❌ Incorrect admin password.';
                status.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'Connecting to Cloud...';
            status.classList.add('hidden');
            progressContainer.classList.add('hidden');

            try {
                // 2. Prepare filename
                const ext = pdfFile.name.split('.').pop() || 'pdf';
                const filename = `${category}_${year}_${Date.now()}.${ext}`;

                // 3. Show Progress Bar
                progressContainer.classList.remove('hidden');
                btn.innerHTML = 'Uploading File...';

                // 4. DIRECT UPLOAD TO SUPABASE (Bypass Vercel!)
                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('exam_papers')
                    .upload(filename, pdfFile, {
                        cacheControl: '3600',
                        upsert: false
                    });

                if (uploadError) throw uploadError;

                // 5. Get Public URL
                const { data: { publicUrl } } = supabase.storage
                    .from('exam_papers')
                    .getPublicUrl(filename);

                // 6. Record in Database
                btn.innerHTML = 'Saving Record...';
                const { error: dbError } = await supabase
                    .from('papers')
                    .insert([{
                        category: category,
                        year: parseInt(year),
                        shiftTitle: shiftTitle,
                        fileUrl: publicUrl
                    }]);

                if (dbError) throw dbError;
                
                // 7. Success!
                status.className = 'mt-6 text-center font-semibold text-sm text-green-600';
                status.innerText = '✅ Success! 100MB+ file uploaded straight to Supabase!';
                status.classList.remove('hidden');
                e.target.reset();
                progressContainer.classList.add('hidden');
            } catch(err) {
                status.className = 'mt-6 text-center font-semibold text-sm text-red-500';
                status.innerText = '❌ Error: ' + err.message;
                status.classList.remove('hidden');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Upload Paper';
            }
        });
    </script>
</body>
</html>
