<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Shift | The Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#f7f9fb] text-slate-900 min-h-screen">
    <!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl shadow-sm flex justify-between items-center px-6 py-4 w-full border-b border-slate-200">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white">
                <span class="material-symbols-outlined">school</span>
            </div>
            <span class="text-xl font-extrabold tracking-tighter text-slate-900">The Atelier</span>
        </div>
    </header>

    <main class="pt-28 px-6 max-w-3xl mx-auto pb-32">
        <button onclick="window.close()" class="flex items-center gap-2 text-slate-500 hover:text-blue-600 font-semibold text-sm mb-8 transition-colors">
            <span class="material-symbols-outlined text-lg">arrow_back</span>
            Back to Years
        </button>

        <section class="mb-12">
            <div class="flex items-center gap-3 mb-2">
                <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold uppercase tracking-widest" id="categoryLabel">EAMCET</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900 mb-4">
                <span id="yearLabel">----</span> Papers
            </h1>
            <p class="text-slate-500 leading-relaxed text-lg">Select the specific shift or session you wish to download. Each download includes the official question paper and preliminary answer key.</p>
        </section>

        <div id="shiftsContainer" class="space-y-6">
            <div class="text-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                <p class="mt-4 text-slate-500 font-medium">Loading available shifts...</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const category = params.get('category');
            const year = params.get('year');

            if (category === 'ap_eamcet') document.getElementById('categoryLabel').innerText = 'AP EAMCET';
            if (category === 'ts_eamcet') document.getElementById('categoryLabel').innerText = 'TS EAMCET';
            if (year) document.getElementById('yearLabel').innerText = year;

            const container = document.getElementById('shiftsContainer');

            try {
                const res = await fetch('/api/papers');
                const db = await res.json();
                
                const shifts = (db[category] && db[category][year]) || [];

                if (shifts.length === 0) {
                    container.innerHTML = `
                        <div class="bg-slate-100 rounded-3xl p-8 text-center border-2 border-dashed border-slate-300">
                            <span class="material-symbols-outlined text-4xl text-slate-400 mb-3">folder_off</span>
                            <h3 class="text-xl font-bold text-slate-700 mb-1">No shifts found</h3>
                            <p class="text-slate-500">The papers for this year have not been digitized yet.</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                shifts.forEach(shift => {
                    html += `
                        <!-- 3D Download Button -->
                        <a href="/${shift.fileUrl}" download class="w-full relative block group select-none">
                           <!-- 3D Shadow Layer -->
                           <div class="absolute inset-0 bg-blue-800 rounded-3xl transform translate-y-2 group-hover:translate-y-3 group-active:translate-y-0 transition-transform duration-200"></div>
                           
                           <!-- Front Button Layer -->
                           <div class="relative bg-gradient-to-br from-blue-500 to-blue-600 border-2 border-blue-400 rounded-3xl p-8 transform group-hover:-translate-y-1 group-active:translate-y-2 transition-transform duration-200 flex flex-col md:flex-row justify-between md:items-center text-white gap-4">
                               <div>
                                   <div class="flex items-center gap-2 mb-2 opacity-80">
                                        <span class="material-symbols-outlined text-sm">schedule</span>
                                        <span class="text-xs font-bold uppercase tracking-widest">Official Paper</span>
                                   </div>
                                   <h3 class="text-2xl font-bold tracking-tight">${shift.shiftTitle}</h3>
                               </div>
                               <div class="flex items-center gap-3 bg-white/20 px-6 py-4 rounded-2xl backdrop-blur-sm self-start md:self-auto group-hover:bg-white/30 transition-colors">
                                   <span class="font-bold">Download</span>
                                   <span class="material-symbols-outlined text-2xl">download</span>
                               </div>
                           </div>
                        </a>
                    `;
                });
                container.innerHTML = html;

            } catch (err) {
                console.error(err);
                container.innerHTML = '<div class="text-red-500 font-bold p-6 bg-red-50 rounded-2xl">Failed to load shifts. Please make sure the backend server is running!</div>';
            }
        });
    </script>
</body>
</html>
