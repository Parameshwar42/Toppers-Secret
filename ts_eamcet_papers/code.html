<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen">
<header class="fixed top-0 w-full z-50 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-xl shadow-[0_8px_24px_rgba(25,28,30,0.06)] flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-blue-600 dark:text-blue-400" data-icon="school">school</span>
<span class="text-xl font-extrabold tracking-tighter text-slate-900 dark:text-slate-50 font-['Plus_Jakarta_Sans']">The Atelier</span>
</div>
<div class="flex items-center gap-2 px-4 py-2 bg-primary-container text-on-primary-container rounded-full text-sm font-bold tracking-tight">
<span class="material-symbols-outlined text-lg" data-icon="account_balance_wallet">account_balance_wallet</span>
            25 Credits
        </div>
</header>
<main class="pt-24 px-6 max-w-5xl mx-auto pb-32">
  <section class="mb-10 text-center md:text-left">
    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-on-surface mb-2">TS EAMCET Papers</h1>
    <p class="text-on-surface-variant max-w-2xl mb-8 leading-relaxed">Access the definitive collection of TS EAMCET previous year question papers. Select a year to begin your download.</p>
  </section>

      <div id="papers-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
    <div class="col-span-full text-center py-10 text-on-surface-variant font-medium">Loading papers database...</div>
  </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const grid = document.getElementById('papers-grid');
        const category = 'ts_eamcet'; 
        
        try {
            const res = await fetch('/api/papers');
            const db = await res.json();
            const uploadedPapers = db[category] || {};
            
            let html = '';
            for (let year = 2024; year >= 2015; year--) {
                const shiftsArray = uploadedPapers[year];
                const hasShifts = Array.isArray(shiftsArray) && shiftsArray.length > 0;
                
                if (hasShifts) {
                    html += `
                        <a href="../shift_details/code.html?category=${category}&year=${year}" target="_blank" class="group flex flex-col items-center justify-center aspect-square bg-surface-container-lowest rounded-3xl shadow-[0_4px_20px_rgba(25,28,30,0.03)] hover:shadow-[0_8px_32px_rgba(25,28,30,0.08)] transition-all border border-transparent hover:border-primary/20 hover:-translate-y-1 active:scale-95">
                            <div class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center mb-4 text-primary group-hover:scale-110 group-hover:bg-primary transition-all duration-300">
                                <span class="material-symbols-outlined group-hover:text-on-primary" style="font-variation-settings: 'FILL' 1;">description</span>
                            </div>
                            <h3 class="font-headline text-2xl font-bold text-on-surface group-hover:text-primary transition-colors">${year}</h3>
                            <p class="text-[10px] uppercase tracking-widest text-green-600 font-bold mt-1">${shiftsArray.length} Shift${shiftsArray.length > 1 ? 's' : ''}</p>
                        </a>
                    `;
                } else {
                    html += `
                        <div class="flex flex-col items-center justify-center aspect-square bg-surface-container/30 rounded-3xl border border-transparent opacity-60">
                            <div class="w-14 h-14 bg-surface-variant/50 rounded-2xl flex items-center justify-center mb-4 text-on-surface-variant">
                                <span class="material-symbols-outlined">lock</span>
                            </div>
                            <h3 class="font-headline text-2xl font-bold text-on-surface-variant">${year}</h3>
                            <p class="text-[10px] uppercase tracking-widest text-on-surface-variant/70 font-semibold mt-1">Coming Soon</p>
                        </div>
                    `;
                }
            }
            grid.innerHTML = html;
        } catch (e) {
            console.error(e);
            grid.innerHTML = '<div class="col-span-full text-center py-10 text-red-500 font-bold">Failed to load from server. Ensure Node.js backend is running.</div>';
        }
    });
</script>
<nav class="md:hidden fixed bottom-0 w-full z-50 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-xl rounded-t-[1.5rem] shadow-[0_-8px_24px_rgba(25,28,30,0.06)] flex justify-around items-center px-4 pb-safe pt-2 h-20">
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-2 hover:text-blue-600 dark:hover:text-blue-400 active:scale-98 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium uppercase tracking-wider mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-200 rounded-2xl px-5 py-2 active:scale-98 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="description">description</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium uppercase tracking-wider mt-1">Documents</span>
</a>
